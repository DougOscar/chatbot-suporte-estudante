name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs antigos do mesmo branch/PR quando chega um novo push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"
  UV_NO_SYNC: "0"

jobs:
  lint-and-type:
    name: Lint + Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sincronizar dependências
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src tests migrations

  tests:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chatbot
          POSTGRES_PASSWORD: chatbot
          POSTGRES_DB: chatbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatbot -d chatbot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

    env:
      DATABASE_URL: postgresql+psycopg://chatbot:chatbot@localhost:5432/chatbot

    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sincronizar dependências
        run: uv sync --frozen

      - name: Aplicar migrações
        run: uv run alembic upgrade head

      - name: pytest
        run: uv run pytest -ra

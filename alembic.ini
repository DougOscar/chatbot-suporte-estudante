[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
file_template = %%(rev)s_%%(slug)s

# A URL real é definida em migrations/env.py via chatbot.config.get_settings(),
# que lê DATABASE_URL do .env. Esta linha existe apenas para satisfazer o
# parser do alembic.ini — o valor é sobrescrito antes da conexão.
sqlalchemy.url = driver://placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
